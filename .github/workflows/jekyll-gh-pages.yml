name: Deploy MTG Knowledge Graph Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix asset paths for GitHub Pages subfolder
        run: |
          sed -i 's|href="/styles.css"|href="styles.css"|g' mtg-knowledge-graph/frontend/index.html
          sed -i 's|src="/app.js"|src="app.js"|g' mtg-knowledge-graph/frontend/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mtg-knowledge-graph/frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
